name: Claude Code
description: Run Claude Code AI assistant inside Home Assistant to create automations, debug issues, and manage your smart home configuration
version: "1.2.80"
slug: claudecode
url: https://github.com/umrath/claude-hass-app
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: true
ingress: true
ingress_port: 7681
ingress_stream: true
panel_icon: mdi:brain
panel_title: Claude Code
homeassistant_api: true
auth_api: true
hassio_api: true
hassio_role: manager
full_access: false
map:
  - homeassistant_config:rw
  - ssl:ro
  - share:rw
  - media:rw
  - addon_config:rw
  - backup:ro
options:
  enable_mcp: true
  terminal_font_size: 14
  terminal_theme: dark
  session_persistence: true
  auto_update_claude: true
schema:
  enable_mcp: bool
  terminal_font_size: int(10,24)
  terminal_theme: list(dark|light)
  session_persistence: bool
  auto_update_claude: bool
environment:
  TERM: xterm-256color
